name: 机场订阅流量面板
description: 显示机场订阅的流量剩余、使用情况及到期时间。
author: s486tt-ship-it
icon: leaf.fill

# [2, 3] 定义模板参数，SUB_URL 为变量名
compat_arguments:
  SUB_URL: "请在此处输入你的订阅链接"

# [3] 模块参数说明
compat_arguments_desc: |
  SUB_URL: 机场提供的订阅链接，用于获取流量和到期信息。

# [3] 定义面板
panels:
  - name: airport_info_panel
    title: 机场订阅信息
    content: 正在获取数据...
    icon: airplane.circle.fill

# [3] 定义处理脚本
scriptings:
  - name: AirportScript
    type: generic
    # 使用 {{{SUB_URL}}} 进行变量替换，将 UI 填写的链接传给脚本 [1]
    argument: "url={{{SUB_URL}}}"
    script_path: https://raw.githubusercontent.com/s486tt-ship-it/Egern-Panel/main/Egern-Panel/%E8%87%AA%E5%88%B6-Panel/%E6%9C%BA%E5%9C%BA%E8%AE%A2%E9%98%85%E9%9D%A2%E6%9D%BF/airport.js
    update_interval: 3600
