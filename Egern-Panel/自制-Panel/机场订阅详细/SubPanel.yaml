# =============================================================
# Egern 机场流量面板模块
# 版本：1.0.0
# 适配：Egern 2.16+
#
# 使用方法：
#   1. 将此文件导入 Egern（模块 → 添加模块 → 选择本地文件）
#   2. 如使用本地脚本，将 scripts/ 目录下的 .js 文件放到 iCloud
#      或 Egern 可访问的路径，然后修改下方 script_url 为对应路径。
#   3. 更新任意一个机场的订阅后，面板数据自动刷新。
#
# 注意：
#   - match 正则需覆盖你的机场订阅域名，当前使用通配符匹配所有 HTTPS 请求，
#     请根据实际情况收窄范围（见下方 match 字段注释）。
#   - 此模块不会修改任何请求/响应内容，仅做信息读取。
# =============================================================

name: 机场流量面板
desc: 查看机场订阅的流量使用情况、剩余流量及到期时间

# ===========================================================
# 面板配置
# ===========================================================
panels:
  - name: 机场流量面板
    # 面板脚本：读取存储数据并格式化展示
    script_url: scripts/sub_panel.js
    # 面板自动刷新间隔（秒），0 = 仅手动刷新
    interval: 0

# ===========================================================
# 脚本配置
# ===========================================================
scripts:
  # -----------------------------------------------------------
  # 订阅信息采集脚本（HTTP 响应拦截）
  # 拦截机场订阅链接的响应，解析 subscription-userinfo 响应头
  # -----------------------------------------------------------
  - name: 机场订阅信息采集
    type: http_response
    # 匹配规则：匹配常见机场订阅链接特征
    # 说明：
    #   - 当前规则匹配 URL 中含有 subscribe/sub/clash/v2ray/trojan 等关键词的请求
    #   - 如果你的机场订阅链接格式不同，请修改此正则
    #   - 也可以直接填写你的订阅链接域名，例如：https://example-airport\.com/.*
    match: "^https?://.+(sub|subscribe|clash|v2ray|trojan|singbox|stash|config|profile|list).*"
    script_url: scripts/sub_store.js
    # 需要读取响应头（获取 subscription-userinfo），但不需要读取响应体
    body_required: false
    # 脚本最长执行时间（秒）
    timeout: 10
