name: 机场订阅流量面板
description: 在面板中展示机场订阅的流量使用详情。
author: s486tt-ship-it
icon: airplane.circle.fill

# 定义模块参数 [1, 5]
compat_arguments:
  SUB_URL: "请在此输入订阅链接"

# 定义面板 [2]
panels:
  - name: sub_info_panel
    title: 机场订阅信息
    content: "正在获取数据..."
    icon: leaf.fill

# 脚本配置 [2]
scriptings:
  - name: AirportScript
    type: generic
    # 使用参数传递链接 [1]
    argument: "url={{{SUB_URL}}}"
    script_path: https://raw.githubusercontent.com/s486tt-ship-it/Egern-Panel/main/Egern-Panel/Subscription-Template/airport.js
    update_interval: 3600
