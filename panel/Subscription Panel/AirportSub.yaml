name: "机场订阅流量面板"
description: "显示机场订阅的流量使用情况和到期时间。请在模块参数中设置您的订阅链接。"
author: "Trae"
icon: "airplane.circle"
homepage: "https://github.com/Trae"

compat_arguments:
  AIRPORT1_NAME: "机场1"
  AIRPORT1_URL: ""
  AIRPORT2_NAME: "机场2"
  AIRPORT2_URL: ""

panels:
  - name: airport_panel_1
    title: "机场订阅 1"
    content: "正在获取数据..."
    icon: "airplane.circle"
    script_url: "https://raw.githubusercontent.com/s486tt-ship-it/Egern-Panel/main/panel/Subscription%20Panel/AirportSub.js"
    update_interval: 3600
    arguments:
      url: "{AIRPORT1_URL}"
      name: "{AIRPORT1_NAME}"
      panel_name: "airport_panel_1"
  - name: airport_panel_2
    title: "机场订阅 2"
    content: "正在获取数据..."
    icon: "airplane.circle"
    script_url: "https://raw.githubusercontent.com/s486tt-ship-it/Egern-Panel/main/panel/Subscription%20Panel/AirportSub.js"
    update_interval: 3600
    arguments:
      url: "{AIRPORT2_URL}"
      name: "{AIRPORT2_NAME}"
      panel_name: "airport_panel_2"

scriptings:
  - generic:
      name: manual_update_airport
      script_url: "https://raw.githubusercontent.com/s486tt-ship-it/Egern-Panel/main/panel/Subscription%20Panel/AirportSub.js"
      arguments:
        url: "{AIRPORT1_URL}"
        panel_name: "airport_panel_1"
        name: "{AIRPORT1_NAME}"
